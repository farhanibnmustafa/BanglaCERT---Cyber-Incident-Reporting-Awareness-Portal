{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="BanglaCERT — Bangladesh's Cyber Incident Reporting & Awareness Portal">
    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/png">
    <!-- React Integrations -->
    <link rel="stylesheet" href="{% static 'react/app.css' %}">
    <script type="module" src="{% static 'react/app.js' %}"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>{% block title %}BanglaCERT{% endblock %}</title>
    <style>
        /* =============================================
           BANGLA CERT — DOTDNA MIDNIGHT NAVY THEME
           Deep navy-blue atmosphere, not pure dark
        ============================================= */
        :root {
            /* Backgrounds — midnight navy-slate, blue undertone */
            --bg-void:      #080E1C;
            --bg-deep:      #0B1220;
            --bg-page:      #0D1628;
            --bg-surface:   #111E35;
            --bg-elevated:  #162440;
            --bg-card:      #1A2A48;
            --bg-card-hover:#1E3055;

            /* Accent Colors */
            --accent-green:  #00E87A;
            --accent-green-dim: rgba(0,232,122,0.18);
            --accent-green-glow: rgba(0,232,122,0.35);
            --accent-cyan:   #38BDF8;
            --accent-cyan-dim: rgba(56,189,248,0.18);
            --accent-purple: #818CF8;

            /* Text palette — cool blue-white tint */
            --text-primary:   #C8D9EE;
            --text-secondary: #7A93B4;
            --text-accent:    #00E87A;
            --text-bright:    #E8F2FF;
            --text-heading:   #D6E8FF;

            /* Borders */
            --border-subtle:  rgba(56,189,248,0.12);
            --border-card:    rgba(56,189,248,0.18);
            --border-green:   rgba(0,232,122,0.20);
            --border-hover:   rgba(0,232,122,0.45);

            /* Button */
            --btn-bg:         linear-gradient(135deg, #00C76A 0%, #00A356 60%, #007A40 100%);
            --btn-bg-hover:   linear-gradient(135deg, #00E87A 0%, #00C76A 60%, #00A356 100%);
            --btn-shadow:     0 8px 24px rgba(0,232,122,0.28);
            --btn-shadow-hover: 0 12px 32px rgba(0,232,122,0.45);

            /* Glows */
            --glow-green:  0 0 20px rgba(0,232,122,0.30);
            --glow-cyan:   0 0 20px rgba(56,189,248,0.30);
            --glow-green-lg: 0 0 40px rgba(0,232,122,0.20);

            /* Shadows */
            --shadow-card:    0 8px 32px rgba(4,10,22,0.60);
            --shadow-nav:     0 8px 40px rgba(4,8,20,0.56);

            /* Radius */
            --radius-xl:  28px;
            --radius-lg:  20px;
            --radius-md:  14px;
            --radius-sm:  10px;
            --radius-xs:  7px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            color: var(--text-primary);
            font-family: 'Inter', 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-page);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56,189,248,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 100% 100%, rgba(0,232,122,0.07) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 0% 80%, rgba(129,140,248,0.06) 0%, transparent 50%);
            min-height: 100vh;
            position: relative;
            line-height: 1.6;
        }

        /* Dot-grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle, rgba(56,189,248,0.20) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(180deg,
                rgba(0,0,0,0.6) 0%,
                rgba(0,0,0,0.15) 60%,
                transparent 100%);
        }

        /* Ambient glow blobs */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(0,232,122,0.06), transparent 25%),
                radial-gradient(circle at 85% 15%, rgba(56,189,248,0.08), transparent 22%),
                radial-gradient(circle at 75% 80%, rgba(129,140,248,0.06), transparent 20%);
        }

        a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a:hover { color: var(--accent-green); }

        /* ========= MAIN LAYOUT ========= */
        main {
            position: relative;
            z-index: 1;
            width: min(1200px, calc(100% - 32px));
            margin: 24px auto 60px;
            padding: 0;
        }

        /* ========= FLASH MESSAGES ========= */
        .flash-messages-shell { margin-bottom: 28px; }

        .flash {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            border: 1px solid rgba(56,189,248,0.30);
            background: rgba(56,189,248,0.08);
            color: #A8D8F0;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
        }
        .flash::before {
            content: '▶';
            color: var(--accent-cyan);
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .errorlist {
            color: #FF6B6B;
            margin: 6px 0 10px;
            padding-left: 18px;
            font-size: 0.875rem;
        }

        /* ========= TYPOGRAPHY ========= */
        h1, h2, h3, h4 {
            color: var(--text-heading);
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }
        h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            margin-bottom: 14px;
            background: linear-gradient(135deg, #D6E8FF 0%, #38BDF8 50%, #00E87A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-size: clamp(1.15rem, 2vw, 1.6rem); font-family: 'Outfit', 'Inter', sans-serif;
            margin-bottom: 12px;
            color: var(--text-heading);
        }
        h3 { font-size: clamp(1rem, 1.5vw, 1.25rem); margin-bottom: 10px; font-family: 'Outfit', 'Inter', sans-serif; }

        .lede {
            max-width: 68ch;
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 1.2vw, 1.05rem);
            line-height: 1.75;
            margin-bottom: 28px;
        }

        .muted { color: var(--text-secondary); }

        .mono {
            font-family: ui-monospace, 'SFMono-Regular', 'Consolas', monospace;
            letter-spacing: 0.03em;
            color: var(--accent-green);
            background: rgba(0,232,122,0.08);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ========= EYEBROW BADGE ========= */
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            margin-bottom: 14px;
            border-radius: 999px;
            border: 1px solid var(--border-green);
            background: rgba(0,232,122,0.08);
            color: var(--accent-green);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .eyebrow::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-green); }
            50% { opacity: 0.5; box-shadow: 0 0 16px var(--accent-green); }
        }

        /* ========= STATUS TAGS ========= */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid var(--border-green);
            background: rgba(0,232,122,0.10);
            color: var(--accent-green);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        /* ========= SECTION BLOCKS ========= */
        .section-block {
            position: relative;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-xl);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.04);
            padding: clamp(20px, 3vw, 32px);
            margin-bottom: 28px;
            overflow: hidden;
            animation: rise-in 0.5s ease both;
        }
        .section-block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                var(--accent-green) 0%,
                var(--accent-cyan) 50%,
                transparent 100%);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        /* ========= PANELS ========= */
        .panel {
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            box-shadow: var(--shadow-card);
            padding: clamp(18px, 2.5vw, 28px);
            margin-bottom: 24px;
        }

        /* ========= DETAIL HERO ========= */
        .detail-hero {
            position: relative;
            padding: clamp(24px, 3vw, 36px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-xl);
            background:
                linear-gradient(160deg, rgba(22,36,64,0.98) 0%, rgba(11,18,32,0.96) 100%),
                radial-gradient(circle at top right, rgba(0,232,122,0.12), transparent 40%);
            color: var(--text-primary);
            box-shadow: var(--shadow-card);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .detail-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan) 60%, transparent);
        }
        .detail-hero h1 {
            background: linear-gradient(135deg, #E0EFFF 0%, #38BDF8 60%, #00E87A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .detail-hero .muted { color: rgba(120,160,210,0.80); }
        .detail-hero .section-link { color: var(--accent-green); }
        .detail-hero .section-link::after { color: var(--accent-green); }
        .detail-hero .tag {
            background: rgba(0,232,122,0.15);
            border-color: rgba(0,232,122,0.35);
            color: var(--accent-green);
        }

        /* ========= METRIC GRID ========= */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .metric-card {
            padding: clamp(16px, 2vw, 22px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-card);
            background:
                linear-gradient(160deg, var(--bg-elevated) 0%, var(--bg-surface) 100%),
                radial-gradient(circle at top right, rgba(0,232,122,0.06), transparent 60%);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(56,189,248,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .metric-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,232,122,0.35), transparent);
        }
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-card), var(--glow-green);
            border-color: var(--border-green);
        }
        .metric-label {
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Outfit', 'Inter', sans-serif;
            margin-bottom: 10px;
        }
        .metric-card h2 {
            margin: 0;
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        /* ========= CHART PANELS ========= */
        .chart-panel {
            padding: clamp(18px, 2vw, 24px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            margin-bottom: 22px;
        }
        .bar-row {
            display: grid;
            grid-template-columns: 180px 1fr 44px;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }
        .bar-label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        .bar-track {
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(56,189,248,0.10);
        }
        .bar-fill {
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-green) 0%, var(--accent-cyan) 100%);
            box-shadow: 0 0 12px rgba(0,232,122,0.40);
        }

        /* ========= TREND / STORY CARDS ========= */
        .trend-shell {
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            padding: clamp(16px, 2vw, 22px);
        }
        .trend-grid { display: grid; gap: 10px; align-items: end; margin-top: 16px; }
        .trend-column { text-align: center; }
        .trend-bar-wrap { height: 120px; display: flex; align-items: end; justify-content: center; margin-bottom: 8px; }
        .trend-bar {
            width: 28px;
            border-radius: 6px 6px 0 0;
            background: linear-gradient(180deg, var(--accent-green), rgba(0,232,122,0.4));
            box-shadow: 0 0 12px rgba(0,232,122,0.25);
        }

        .story-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .story-card {
            position: relative;
            padding: clamp(18px, 2.5vw, 26px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-card);
            background:
                linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%),
                radial-gradient(circle at top right, rgba(56,189,248,0.06), transparent 40%);
            color: var(--text-primary);
            box-shadow: var(--shadow-card);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }
        .story-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), transparent 70%);
        }
        .story-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card), var(--glow-green);
        }
        .story-card h2 {
            color: var(--text-heading);
            margin-bottom: 8px;
            font-size: clamp(1rem, 1.5vw, 1.25rem);
        }
        .story-meta {
            margin: 0 0 12px;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .story-copy { margin: 0 0 16px; color: var(--text-primary); line-height: 1.7; }
        .stat-line { margin: 0 0 14px; color: var(--text-secondary); font-size: 13px; }

        /* ========= ACTION ROW ========= */
        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ========= BUTTONS ========= */
        button,
        .nav-link-button,
        .cta-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 20px;
            border-radius: 999px;
            border: 1px solid rgba(0,200,100,0.60);
            background: var(--btn-bg);
            color: #fff;
            font-weight: 700;
            font-size: 0.875rem;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: var(--btn-shadow);
        }
        button:hover,
        .nav-link-button:hover,
        .cta-link:hover {
            background: var(--btn-bg-hover);
            transform: translateY(-1px);
            box-shadow: var(--btn-shadow-hover);
        }

        .light-button {
            background: linear-gradient(135deg, rgba(56,189,248,0.15) 0%, rgba(56,189,248,0.08) 100%);
            border-color: rgba(56,189,248,0.40);
            color: var(--accent-cyan);
            box-shadow: 0 4px 16px rgba(56,189,248,0.15);
        }
        .light-button:hover {
            background: linear-gradient(135deg, rgba(56,189,248,0.25) 0%, rgba(56,189,248,0.15) 100%);
            box-shadow: 0 8px 24px rgba(56,189,248,0.25);
            transform: translateY(-1px);
            color: var(--accent-cyan);
        }

        /* ========= SECTION LINK ========= */
        .section-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-green);
            font-weight: 700;
            font-size: 0.875rem;
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: gap 0.2s ease;
        }
        .section-link::after { content: '→'; font-family: 'Outfit', 'Inter', sans-serif; }
        .section-link:hover { gap: 14px; color: var(--accent-green); }

        /* ========= SEARCH & RESULTS ========= */
        .search-panel {
            padding: clamp(18px, 2.5vw, 28px);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-xl);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            box-shadow: var(--shadow-card);
        }
        .results-stack { display: grid; gap: 18px; }
        .results-card {
            padding: clamp(16px, 2vw, 22px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-card);
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            box-shadow: var(--shadow-card);
        }

        /* ========= FORMS ========= */
        form p { margin: 12px 0; }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        input, select, textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            background: rgba(11,18,32,0.80);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(4px);
        }
        input::placeholder, textarea::placeholder {
            color: rgba(122,147,180,0.55);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(0,232,122,0.55);
            box-shadow: 0 0 0 3px rgba(0,232,122,0.12);
        }
        select option { background: var(--bg-surface); color: var(--text-primary); }

        /* ========= TABLES ========= */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        th {
            background: rgba(56,189,248,0.08);
            color: var(--text-secondary);
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 13px 16px;
            text-align: left;
            font-family: 'Outfit', 'Inter', sans-serif;
            font-weight: 700;
            border-bottom: 1px solid var(--border-card);
        }
        td {
            padding: 13px 16px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(56,189,248,0.08);
            vertical-align: top;
            font-size: 0.9rem;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(56,189,248,0.04); }

        /* ========= LAYOUT HELPERS ========= */
        .row { display: flex; gap: 18px; }
        .col { flex: 1; min-width: 0; }
        .inline-list { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

        /* ========= COMMENT CARD ========= */
        .comment-card {
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 16px;
            background: rgba(11,18,32,0.60);
            margin-bottom: 12px;
            backdrop-filter: blur(6px);
        }

        /* ========= ADMIN SETUP CARD ========= */
        .admin-setup-card {
            max-width: 640px;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 20px;
            background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-surface) 100%);
            box-shadow: var(--shadow-card);
        }

        /* ========= STATUS SNAPSHOT CARDS ========= */
        .status-snapshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin: 0 0 28px;
        }
        .status-card {
            border-radius: var(--radius-lg);
            padding: clamp(14px, 2vw, 20px);
            border: 1px solid;
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .status-card:hover { transform: translateY(-2px); }
        .status-card.pending {
            border-color: rgba(251,191,36,0.30);
            background: linear-gradient(160deg, rgba(28,24,14,1) 0%, rgba(20,18,10,1) 100%);
        }
        .status-card.under-review {
            border-color: rgba(56,189,248,0.30);
            background: linear-gradient(160deg, rgba(11,20,35,1) 0%, rgba(9,16,28,1) 100%);
        }
        .status-card.needs-clarification {
            border-color: rgba(251,146,60,0.30);
            background: linear-gradient(160deg, rgba(28,18,10,1) 0%, rgba(20,14,8,1) 100%);
        }
        .status-card.verified {
            border-color: rgba(0,232,122,0.30);
            background: linear-gradient(160deg, rgba(10,26,18,1) 0%, rgba(8,20,14,1) 100%);
        }
        .status-card.rejected {
            border-color: rgba(239,68,68,0.30);
            background: linear-gradient(160deg, rgba(28,10,10,1) 0%, rgba(20,8,8,1) 100%);
        }
        .status-label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .status-card.pending .status-label { color: #FCD34D; }
        .status-card.under-review .status-label { color: var(--accent-cyan); }
        .status-card.needs-clarification .status-label { color: #FB923C; }
        .status-card.verified .status-label { color: var(--accent-green); }
        .status-card.rejected .status-label { color: #F87171; }
        .status-count {
            margin-top: 12px;
            font-size: clamp(2rem, 3.5vw, 2.8rem);
            font-weight: 900;
            line-height: 1;
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .status-card.pending .status-count { color: #F59E0B; }
        .status-card.under-review .status-count { color: var(--accent-cyan); }
        .status-card.needs-clarification .status-count { color: #F97316; }
        .status-card.verified .status-count { color: var(--accent-green); }
        .status-card.rejected .status-count { color: #EF4444; }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            flex-shrink: 0;
        }
        .status-card.pending .status-dot { background: #F59E0B; box-shadow: 0 0 8px #F59E0B; }
        .status-card.under-review .status-dot { background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); }
        .status-card.needs-clarification .status-dot { background: #F97316; box-shadow: 0 0 8px #F97316; }
        .status-card.verified .status-dot { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-card.rejected .status-dot { background: #EF4444; box-shadow: 0 0 8px #EF4444; }

        /* ========= ANIMATIONS ========= */
        @keyframes rise-in {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ========= RESPONSIVE ========= */

        /* 4K / Projector >= 1920px */
        @media (min-width: 1920px) {
            html { font-size: 18px; }
            main { width: min(1400px, calc(100% - 48px)); margin: 32px auto 80px; }
            .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 24px; }
            .section-block, .panel { padding: 40px; }
        }

        /* Large desktop 1440px–1920px */
        @media (min-width: 1440px) and (max-width: 1919px) {
            main { width: min(1320px, calc(100% - 40px)); }
        }

        /* Laptop 1024px–1280px */
        @media (min-width: 1024px) and (max-width: 1279px) {
            .metric-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Tablet 768px–1023px */
        @media (min-width: 768px) and (max-width: 1023px) {
            .metric-grid { grid-template-columns: repeat(2, 1fr); }
            .bar-row { grid-template-columns: 140px 1fr 40px; }
        }

        /* Phablet 576px–767px */
        @media (max-width: 767px) {
            main { margin: 16px auto 48px; width: calc(100% - 24px); }
            .metric-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .row { flex-direction: column; gap: 14px; }
            .bar-row { grid-template-columns: 1fr; gap: 8px; }
            .trend-grid { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
        }

        /* Mobile <480px */
        @media (max-width: 479px) {
            html { font-size: 14px; }
            .metric-grid { grid-template-columns: 1fr; }
            .status-snapshot-grid { grid-template-columns: 1fr 1fr; }
            .section-block, .panel { padding: 16px; }
            .search-panel { padding: 14px; }
            h1 { font-size: 1.6rem; }
        }

        /* Very small <360px */
        @media (max-width: 359px) {
            html { font-size: 13px; }
            .status-snapshot-grid { grid-template-columns: 1fr; }
        }

        /* ========= HIDE SCROLLBAR (keep scroll functional) ========= */
        ::-webkit-scrollbar { width: 0; height: 0; }
        * { scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="react-navbar-root"
         data-username="{{ user.username|default:'' }}"
         data-is-authenticated="{{ user.is_authenticated|yesno:'true,false' }}"
         data-is-staff="{{ user.is_staff|yesno:'true,false' }}"
         data-logo-url="{% static 'img/logo.png' %}"
         data-url-home="{% url 'incidents:home' %}"
         data-url-admin="{% url 'admin:index' %}"
         data-url-awareness="{% url 'awareness:list' %}"
         data-url-report="{% url 'incidents:public_report' %}"
         data-url-my-reports="{% url 'incidents:my_incidents' %}"
         data-url-login="{% url 'accounts:login' %}"
         data-url-register="{% url 'accounts:register' %}"
         data-url-logout="{% url 'accounts:logout' %}"
         data-csrf-token="{{ csrf_token }}">
    </div>
    <main>
        {% if messages %}
            <div class="flash-messages-shell">
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
