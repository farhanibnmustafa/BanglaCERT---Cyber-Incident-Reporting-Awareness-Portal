{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | BanglaCERT</title>
    <link rel="stylesheet" href="{% static 'css/auth_pages.css' %}">
</head>
<body class="auth-page">
    <header class="auth-hero">
        <div class="auth-brand">
            <div class="hero-brand">
                <a href="{% url 'incidents:home' %}" style="text-decoration:none; color:inherit;">
                    <div class="brand-row">
                        <img class="brand-logo" src="{% static 'img/logo.png' %}" alt="BanglaCERT">
                    </div>
                </a>
            </div>
        </div>
    </header>

    <section class="auth-shell">
        <div class="auth-card">
            <div class="auth-card-body">
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">
                    Enter your email address below, and we'll email instructions for setting a new one.
                </p>
                <div class="auth-divider"></div>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="auth-field">
                        <label for="{{ form.email.id_for_label }}">Email Address</label>
                        {{ form.email }}
                        {% if form.email.errors %}
                            <div class="field-error">{{ form.email.errors|striptags }}</div>
                        {% endif %}
                    </div>
                    <button class="auth-btn auth-btn-blue" type="submit">Send Reset Link</button>
                </form>

                <div class="auth-actions auth-actions-center" style="text-align: center; margin-top: 20px;">
                    <a class="aux-link" href="{% url 'accounts:login' %}">Return to Login</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
