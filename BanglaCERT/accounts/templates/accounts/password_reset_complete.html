{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Reset Complete | BanglaCERT</title>
    <link rel="stylesheet" href="{% static 'css/auth_pages.css' %}">
</head>
<body class="auth-page">
    <header class="auth-hero">
        <div class="auth-brand">
            <div class="hero-brand">
                <a href="{% url 'incidents:home' %}" style="text-decoration:none; color:inherit;">
                    <div class="brand-row">
                        <img class="brand-logo" src="{% static 'img/logo.png' %}" alt="BanglaCERT">
                    </div>
                </a>
            </div>
        </div>
    </header>

    <section class="auth-shell">
        <div class="auth-card">
            <div class="auth-card-body">
                <h1 class="auth-title">Password Reset Complete</h1>
                <p class="auth-subtitle">
                    Your password has been set. You may go ahead and log in now.
                </p>
                <div class="auth-divider"></div>
                <div class="auth-actions auth-actions-center" style="text-align: center; margin-top: 20px;">
                    <a class="auth-btn auth-btn-blue" href="{% url 'accounts:login' %}">Log In Now</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
